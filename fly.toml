# fly.toml app configuration file generated for mixd on 2026-03-18T12:15:48-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'mixd'
primary_region = 'sjc'

[build]
  dockerfile = 'Dockerfile'

  [build.args]
    VITE_NEON_AUTH_URL = 'https://ep-super-glade-ak6se863.neonauth.c-3.us-west-2.aws.neon.tech/neondb/auth'

[deploy]
  release_command = 'alembic upgrade head'

[env]
  # Disable Prefect's ephemeral SQLite-backed FastAPI server. We don't use
  # Prefect's flow-run history/UI (we have our own workflow_runs table);
  # @flow and @task decorators still execute in-process. Cuts ~80-120MB RSS
  # and removes the cold-start OOM that prevented v0.7.8.x workflow runs.
  PREFECT_SERVER_ALLOW_EPHEMERAL_MODE = 'false'
  # Tuning knobs that complement the above (May 2026 Prefect settings ref).
  PREFECT_LOGGING_TO_API_ENABLED = 'false'      # no in-process log-shipping queue
  PREFECT_LOGGING_LEVEL = 'WARNING'             # cut log-record allocations
  PREFECT_RESULTS_PERSIST_BY_DEFAULT = 'false'  # we don't need Prefect to store outputs
  PREFECT_SERVER_ANALYTICS_ENABLED = 'false'    # telemetry off
  PREFECT_API_ENABLE_METRICS = 'false'          # metrics off
  PYTHONUNBUFFERED = '1'
  NEON_AUTH_URL = 'https://ep-super-glade-ak6se863.neonauth.c-3.us-west-2.aws.neon.tech/neondb/auth'
  NEON_AUTH_JWKS_URL = 'https://ep-super-glade-ak6se863.neonauth.c-3.us-west-2.aws.neon.tech/neondb/auth/.well-known/jwks.json'
  ALLOWED_EMAILS = 'a@ashwright.net'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

  [[http_service.checks]]
    interval = '30s'
    timeout = '10s'
    grace_period = '60s'
    method = 'GET'
    path = '/api/v1/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpus = 1
  memory_mb = 512
