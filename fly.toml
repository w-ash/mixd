# fly.toml app configuration file generated for mixd on 2026-03-18T12:15:48-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'mixd'
primary_region = 'sjc'

[build]
  dockerfile = 'Dockerfile'

  [build.args]
    VITE_NEON_AUTH_URL = 'https://ep-super-glade-ak6se863.neonauth.c-3.us-west-2.aws.neon.tech/neondb/auth'

[deploy]
  release_command = 'alembic upgrade head'

[env]
  # Allow Prefect to spin up its embedded SQLite-backed ASGI server when a
  # flow runs. Prefect 3's flow engine REQUIRES a working PrefectClient —
  # `flow_engine.py` calls `update_flow_run`, `set_flow_run_name`, etc.
  # against it for state tracking. There's no offline mode. v0.7.8.5
  # disabled this to save ~80-120MB RSS, but the actual cold-start OOM
  # that motivated v0.7.8.5 came from eager Prefect imports at uvicorn
  # boot (fixed independently by extracting run_guard.py); the ephemeral
  # server now only starts at first-flow-run, not boot, so it doesn't
  # touch the boot-time RSS budget. v0.7.8.8 set PREFECT_API_KEY to a
  # sentinel to silence the events-worker raise; with ephemeral_mode=true
  # the orchestration-client raise at `client/orchestration:259` also
  # goes away. Keep the API_KEY sentinel below so the events worker
  # stays no-op (we don't use Prefect's event UI anyway).
  PREFECT_SERVER_ALLOW_EPHEMERAL_MODE = 'true'
  # Tuning knobs that cut memory inside the ephemeral server (May 2026
  # Prefect settings ref).
  PREFECT_LOGGING_TO_API_ENABLED = 'false'      # no in-process log-shipping queue
  PREFECT_LOGGING_LEVEL = 'WARNING'             # cut log-record allocations
  PREFECT_RESULTS_PERSIST_BY_DEFAULT = 'false'  # we don't need Prefect to store outputs
  PREFECT_SERVER_ANALYTICS_ENABLED = 'false'    # telemetry off
  PREFECT_API_ENABLE_METRICS = 'false'          # metrics off
  # Sentinel — keeps Prefect 3.7's events worker disabled. The events
  # worker has an asymmetric gate: `events/worker.py:60
  # should_emit_events_to_ephemeral_server` only checks whether
  # PREFECT_API_KEY is unset. Setting any non-empty key here makes
  # should_emit_events() return False and emit_event() short-circuits at
  # the top — no events queued, no second ephemeral server attempted.
  # The value is never sent anywhere.
  PREFECT_API_KEY = 'disabled-no-server'
  PYTHONUNBUFFERED = '1'
  NEON_AUTH_URL = 'https://ep-super-glade-ak6se863.neonauth.c-3.us-west-2.aws.neon.tech/neondb/auth'
  NEON_AUTH_JWKS_URL = 'https://ep-super-glade-ak6se863.neonauth.c-3.us-west-2.aws.neon.tech/neondb/auth/.well-known/jwks.json'
  ALLOWED_EMAILS = 'a@ashwright.net'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

  [[http_service.checks]]
    interval = '30s'
    timeout = '10s'
    grace_period = '60s'
    method = 'GET'
    path = '/api/v1/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpus = 1
  memory_mb = 512
