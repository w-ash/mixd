name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  pull-requests: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  python:
    name: Python
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false

      - name: Create Neon branch
        id: neon-branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: ci/pr-${{ github.event.number || github.sha }}
          api_key: ${{ secrets.NEON_API_KEY }}
          database: neondb

      - name: Set DATABASE_URL
        run: echo "DATABASE_URL=${DB_URL/postgres:\/\//postgresql+psycopg:\/\/}" >> "$GITHUB_ENV"
        env:
          DB_URL: ${{ steps.neon-branch.outputs.db_url }}

      - uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run migrations
        run: uv run alembic upgrade head

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run basedpyright src/

      - name: Dead code (Python)
        run: uv run vulture

      - name: Test with coverage
        run: uv run pytest -m "" --cov --cov-report=term-missing --cov-fail-under=80

      - name: Check for migration changes
        if: github.event_name == 'pull_request'
        id: migration-check
        run: echo "changed=$(git diff --name-only origin/main -- alembic/ | head -1)" >> "$GITHUB_OUTPUT"

      - name: Schema diff
        if: github.event_name == 'pull_request' && steps.migration-check.outputs.changed != ''
        uses: neondatabase/schema-diff-action@v1
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          compare_branch: ci/pr-${{ github.event.number }}
          base_branch: main
          api_key: ${{ secrets.NEON_API_KEY }}
          database: neondb

  web:
    name: Web
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          package_json_file: web/package.json

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint and type check
        run: pnpm check

      - name: Dead code (web)
        run: pnpm lint:dead

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
