name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract release notes from CHANGELOG.md
        run: |
          VERSION="${TAG#v}"
          awk -v ver="$VERSION" '
            /^## \[/ { if (found) exit; if (index($0, "[" ver "]")) { found = 1; next } }
            found { print }
          ' CHANGELOG.md > CHANGES.md
          if ! [ -s CHANGES.md ]; then
            echo "::error::CHANGELOG.md has no entry for $VERSION — add one before tagging (see version-management rule)"
            exit 1
          fi
        env:
          TAG: ${{ github.ref_name }}

      - name: Create GitHub Release
        run: gh release create "$TAG" --title "$TAG" --notes-file CHANGES.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}

  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: release
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: superfly/flyctl-actions/setup-flyctl@1.6

      - run: flyctl deploy --remote-only --build-arg "BUILD_HASH=$COMMIT_SHA"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          COMMIT_SHA: ${{ github.sha }}
