[pytest]
# Modern pytest 8.4.1 configuration for test pyramid
testpaths = tests
python_files = test_*.py
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Test pyramid markers (aligned with 2025 testing strategy)
markers =
    # === Test Pyramid Layers ===
    unit: unit tests - pure logic, no external dependencies (<100ms)
    integration: integration tests - real DB, mocked APIs (<1s)
    e2e: end-to-end tests - full system, critical user flows (<10s)

    # === Execution Priority ===
    slow: tests that take longer than 1 second
    diagnostic: diagnostic and profiling tests - for investigation only (skip by default)
    
    # === Domain Areas ===
    domain: domain logic tests - entities, business rules, algorithms
    repository: repository layer tests - database operations and persistence
    connector: external service connector tests - API integrations
    workflow: workflow and orchestration tests - complex business processes
    
    # === Data Operations ===
    import_export: data import/export functionality tests
    deduplication: track/playlist deduplication and merging logic
    matching: track matching and confidence scoring algorithms
    
    # === Special Requirements ===
    manual: tests that require manual intervention or external setup
    network: tests requiring network access (usually mocked in CI)
    performance: performance and load testing with timing assertions
    
# === Usage Examples ===
# Fast development feedback:
#   pytest                              # Skip diagnostics (fast, <1min)
#   pytest -m "unit"                    # All unit tests (<10s)
#   pytest -m "unit and domain"         # Domain logic unit tests
#
# Feature development:
#   pytest -m "deduplication"           # All deduplication tests
#   pytest -m "matching"                # All matching algorithm tests
#   pytest -m "connector and spotify"   # Spotify connector tests
#
# Integration testing:
#   pytest -m "integration and not slow"  # Fast integration tests
#   pytest -m "repository"                # All repository tests
#
# Performance validation:
#   pytest -m "performance"             # All performance tests
#   pytest -m "slow"                    # All slow tests
#   pytest -m "diagnostic"              # Diagnostic/profiling tests only
#
# CI/CD pipelines:
#   pytest -m "not manual and not network"  # Automated tests only
#   pytest -m ""                        # Run ALL tests including diagnostics

# Filtering shortcuts for development workflow
addopts = --strict-markers --tb=short -m "not diagnostic"