exclude: ^docs/dev-setup-guide/
repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
    -   id: trailing-whitespace
        exclude: ^web/src/api/generated/
    -   id: end-of-file-fixer
        exclude: ^web/src/api/generated/
    -   id: check-yaml
    -   id: check-toml
    -   id: check-json
        exclude: tsconfig\.json$
    -   id: debug-statements
    -   id: check-added-large-files
-   repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
    -   id: ruff
        args: [--fix]  # This includes import sorting (no need for separate I hook)
    -   id: ruff-format
-   repo: local
    hooks:
    -   id: uv-lock-check
        name: uv.lock in sync with pyproject.toml
        entry: uv lock --check
        language: system
        files: ^(pyproject\.toml|uv\.lock)$
        pass_filenames: false
    -   id: pnpm-lock-check
        name: pnpm-lock.yaml in sync with package.json
        entry: pnpm --prefix web install --frozen-lockfile
        language: system
        files: ^web/(package\.json|pnpm-lock\.yaml)$
        pass_filenames: false
