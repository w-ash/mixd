<!doctype html>
<html lang="en" class="dark">
  <head>
    <script>
      (function(){
        var t=localStorage.getItem('mixd-theme');
        var d=t!=='light'&&(t==='dark'||!t||matchMedia('(prefers-color-scheme:dark)').matches);
        document.documentElement.classList.toggle('dark',d);
        document.documentElement.style.colorScheme=d?'dark':'light';
      })();
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mixd</title>
    <!-- Google Fonts: preconnect for DNS + TLS warmup -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Critical font (Space Grotesk: nav/headings) loaded blocking for FCP -->
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Non-critical fonts (body + code) loaded async to avoid render-blocking -->
    <link
      href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet"
      />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
