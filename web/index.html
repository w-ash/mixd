<!doctype html>
<html lang="en" class="dark">
  <head>
    <script>
      (function(){
        var t=localStorage.getItem('narada-theme');
        var d=t!=='light'&&(t==='dark'||!t||matchMedia('(prefers-color-scheme:dark)').matches);
        document.documentElement.classList.toggle('dark',d);
        document.documentElement.style.colorScheme=d?'dark':'light';
      })();
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Narada</title>
    <!-- Google Fonts: Space Grotesk (display), Newsreader (body), JetBrains Mono (code) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
