<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <!-- Off-center highlight for metallic sheen -->
    <radialGradient id="sheen" cx="38%" cy="36%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Dark warm background -->
  <rect width="128" height="128" rx="20" fill="#1E1C1A"/>

  <!-- Outer rim (darker edge ring) -->
  <circle cx="64" cy="64" r="52" fill="#9E7B1F"/>

  <!-- Playing surface (main gold disc) -->
  <circle cx="64" cy="64" r="50" fill="#C59A2B"/>

  <!-- Vinyl grooves (concentric rings, varying width for organic feel) -->
  <circle cx="64" cy="64" r="46" fill="none" stroke="#A88220" stroke-width="0.8"/>
  <circle cx="64" cy="64" r="43" fill="none" stroke="#A88220" stroke-width="1.2"/>
  <circle cx="64" cy="64" r="40" fill="none" stroke="#A88220" stroke-width="0.8"/>
  <circle cx="64" cy="64" r="37" fill="none" stroke="#A88220" stroke-width="1.0"/>
  <circle cx="64" cy="64" r="34" fill="none" stroke="#A88220" stroke-width="0.8"/>
  <circle cx="64" cy="64" r="31" fill="none" stroke="#A88220" stroke-width="1.2"/>
  <circle cx="64" cy="64" r="28" fill="none" stroke="#A88220" stroke-width="0.8"/>

  <!-- Lead-in groove (thicker ring at label edge) -->
  <circle cx="64" cy="64" r="22" fill="none" stroke="#9E7B1F" stroke-width="1.5"/>

  <!-- Center label (brighter gold) -->
  <circle cx="64" cy="64" r="20" fill="#D4AC35"/>

  <!-- Spindle hole -->
  <circle cx="64" cy="64" r="7" fill="#1E1C1A"/>

  <!-- Metallic highlight overlay -->
  <circle cx="64" cy="64" r="50" fill="url(#sheen)"/>
</svg>
